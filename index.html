<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>班級打字競賽 - 四年級防弊完整版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <!-- 引入 SheetJS 用於匯出 Excel -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
    <style>
        .char { position: relative; display: inline-block; transition: all 0.2s; border-bottom: 2px solid transparent; min-width: 0.6em; }
        .char.current { border-bottom-color: #3b82f6; background-color: #dbeafe; }
        .char.correct { color: #10b981; }
        .char.incorrect { color: #ef4444; background-color: #fee2e2; }
        .char.pending { color: #9ca3af; }
        .char.newline::after { content: "⏎"; font-size: 0.8em; margin-left: 2px; opacity: 0.7; }
        #text-display { line-height: 1.8; letter-spacing: 0.05em; font-size: 1.5rem; word-break: break-all; white-space: pre-wrap; font-family: ui-monospace, Consolas, monospace; }
        .glass-morphism { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        .my-rank-highlight { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { border-color: #6366f1; } 50% { border-color: #a5b4fc; } }
        .pop-in { animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes popIn { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800 font-sans">

<div id="app" class="max-w-6xl mx-auto p-4 md:p-8">
    <header class="flex justify-between items-center mb-6">
        <div>
            <h1 class="text-3xl font-bold text-indigo-600">⌨️ 班級打字挑戰賽</h1>
            <p id="room-status" class="text-sm text-slate-500 italic">正在載入設定...</p>
        </div>
        <button id="admin-toggle" class="text-slate-400 hover:text-indigo-500 font-medium underline px-4 py-2 rounded-lg bg-slate-100 hover:bg-indigo-50 transition">
            ⚙️ 教師模式
        </button>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
        
        <div class="lg:col-span-2 space-y-6">
            
            <div id="join-screen" class="glass-morphism rounded-2xl p-10 shadow-xl text-center mx-auto border border-slate-100 mt-10">
                <div class="text-6xl mb-6">🎮</div>
                <h2 class="text-3xl font-bold mb-2 text-slate-700">準備好挑戰手速了嗎？</h2>
                <p class="text-slate-500 mb-8">輸入你的姓名，超越自我，爭奪排行榜榮耀！</p>
                <div class="max-w-md mx-auto">
                    <input type="text" id="username-input" placeholder="請輸入參賽姓名" class="w-full p-4 border-2 border-slate-200 rounded-xl mb-4 focus:border-indigo-500 outline-none text-lg text-center font-bold">
                    <button id="start-btn" class="w-full bg-indigo-600 text-white py-4 rounded-xl font-bold text-xl hover:bg-indigo-700 hover:shadow-lg transition transform hover:-translate-y-1">🚀 進入挑戰</button>
                </div>
            </div>

            <div id="game-screen" class="hidden space-y-6">
                <div id="challenge-box" class="bg-gradient-to-r from-indigo-500 to-purple-500 rounded-xl p-4 text-white shadow-md hidden">
                    <div class="flex items-center justify-between">
                        <span class="text-sm font-medium opacity-90">🏃 追蹤挑戰：</span>
                        <span id="target-message" class="font-bold">距離前一名還差 0 分</span>
                    </div>
                </div>

                <div class="glass-morphism rounded-2xl p-6 shadow-lg border border-white">
                    <div class="flex justify-between items-end mb-4 border-b pb-2">
                        <div class="grid grid-cols-2 gap-x-6 gap-y-2 text-sm font-medium">
                            <span class="text-indigo-600 text-lg">目前總分: <span id="current-score" class="font-bold">0</span></span>
                            <span class="text-emerald-600 text-lg">速率: <span id="wpm-display" class="font-bold">0</span> <small>WPM</small></span>
                            <span class="text-slate-500">正確項數: <span id="correct-words">0</span></span>
                            <span class="text-orange-500">歷史最高: <span id="personal-best">0</span></span>
                        </div>
                        <div id="timer" class="text-4xl font-mono font-black text-red-500 tracking-wider">--s</div>
                    </div>
                    
                    <div id="text-display" class="bg-white p-6 rounded-xl border border-slate-200 min-h-[180px] mb-4 select-none shadow-inner"></div>
                    <textarea id="hidden-input" autocomplete="off" class="w-full p-4 border-2 border-slate-200 rounded-xl focus:border-indigo-400 outline-none text-xl resize-none h-16 shadow-sm" placeholder="在此處開始打字..."></textarea>
                </div>
            </div>
        </div>

        <div class="lg:col-span-1">
            <div class="glass-morphism rounded-2xl p-6 shadow-lg border border-white sticky top-8">
                <h3 id="leaderboard-title" class="text-xl font-bold mb-4 flex items-center gap-2 text-slate-700">🏆 即時英雄榜</h3>
                <div id="leaderboard-list" class="space-y-3">
                    <p class="text-center text-slate-400 py-4 italic">載入排行榜中...</p>
                </div>
            </div>
        </div>
    </div>

    <!-- 結算畫面 -->
    <div id="summary-panel" class="hidden fixed inset-0 bg-slate-900/60 flex items-center justify-center p-4 z-[70] backdrop-blur-sm">
        <div class="bg-white rounded-[2rem] p-8 w-full max-w-md shadow-2xl text-center transform transition-all pop-in">
            <h2 class="text-2xl font-bold text-slate-500 mb-1" id="summary-name">挑戰者</h2>
            <div class="text-7xl mb-2 drop-shadow-md" id="summary-badge-icon">🐢</div>
            <h3 class="text-3xl font-black text-indigo-700 mb-2" id="summary-badge-title">烏龜</h3>
            <p class="text-sm text-slate-500 mb-8 font-medium px-4" id="summary-badge-quote">「穩紮穩打！龜兔賽跑的贏家就是你，再多練習一點就會變快！」</p>
            
            <div class="grid grid-cols-3 gap-4 mb-8">
                <div class="bg-emerald-50 p-4 rounded-2xl border border-emerald-100">
                    <div class="text-xs text-emerald-600 font-bold mb-1">正確字數</div>
                    <div class="text-2xl font-black text-emerald-700" id="summary-words">0</div>
                </div>
                <div class="bg-blue-50 p-4 rounded-2xl border border-blue-100">
                    <div class="text-xs text-blue-600 font-bold mb-1">正確率</div>
                    <div class="text-2xl font-black text-blue-700"><span id="summary-accuracy">0</span>%</div>
                </div>
                <div class="bg-indigo-50 p-4 rounded-2xl border border-indigo-100">
                    <div class="text-xs text-indigo-600 font-bold mb-1">速度 WPM</div>
                    <div class="text-2xl font-black text-indigo-700" id="summary-wpm">0</div>
                </div>
            </div>

            <p id="new-record-msg" class="text-amber-500 font-bold mb-4 hidden">🎉 恭喜打破歷史最高分紀錄！</p>

            <button id="restart-btn" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold text-xl hover:bg-indigo-700 transition shadow-lg hover:shadow-indigo-500/40">
                🔄 再玩一次
            </button>
        </div>
    </div>

    <!-- 教師驗證 -->
    <div id="admin-auth-panel" class="hidden fixed inset-0 bg-slate-900/60 flex items-center justify-center p-4 z-[80]">
        <div class="bg-white rounded-2xl p-6 w-full max-w-sm shadow-xl">
            <h2 class="text-xl font-bold mb-4">🔒 教師驗證</h2>
            <input type="password" id="admin-password-input" class="w-full p-3 border-2 rounded-lg mb-4 outline-none focus:border-indigo-500" placeholder="輸入密碼">
            <div class="flex gap-3">
                <button id="confirm-auth" class="flex-1 bg-indigo-600 text-white py-2 rounded-lg font-bold">確認</button>
                <button id="cancel-auth" class="flex-1 bg-slate-200 py-2 rounded-lg font-bold text-slate-600">取消</button>
            </div>
        </div>
    </div>

    <!-- 教師控制台 -->
    <div id="admin-panel" class="hidden fixed inset-0 bg-slate-900/60 flex items-center justify-center p-4 z-[80]">
        <div class="bg-white rounded-2xl p-8 w-full max-w-lg shadow-2xl max-h-[90vh] overflow-y-auto">
            <h2 class="text-2xl font-black mb-6 text-indigo-700">⚙️ 教師控制台</h2>
            
            <label class="block mb-2 text-sm font-bold text-slate-600">比賽題目內容：</label>
            <textarea id="admin-text-input" class="w-full h-32 p-3 border-2 border-slate-200 rounded-lg mb-6 focus:border-indigo-500 outline-none" placeholder="請輸入題目..."></textarea>
            
            <div class="grid grid-cols-2 gap-4 mb-6">
                <div>
                    <label class="block mb-2 text-sm font-bold text-slate-600">比賽時間 (秒)：</label>
                    <input type="number" id="admin-time-input" value="180" class="w-full p-3 border-2 border-slate-200 rounded-lg font-bold">
                </div>
                <div>
                    <label class="block mb-2 text-sm font-bold text-slate-600">排行榜人數：</label>
                    <input type="number" id="admin-limit-input" value="10" class="w-full p-3 border-2 border-slate-200 rounded-lg font-bold">
                </div>
            </div>

            <div class="space-y-3 mb-6 border-t-2 border-slate-100 pt-6">
                <button id="export-excel" class="w-full bg-emerald-50 text-emerald-600 border-2 border-emerald-200 py-3 rounded-lg font-bold hover:bg-emerald-500 hover:text-white transition flex items-center justify-center gap-2">
                    <span>📊</span> 匯出全班成績 Excel
                </button>

                <button id="clear-leaderboard" class="w-full bg-red-50 text-red-600 border-2 border-red-200 py-3 rounded-lg font-bold hover:bg-red-500 hover:text-white transition flex items-center justify-center gap-2">
                    <span>🗑️</span> 清空全班所有成績紀錄
                </button>
                <p class="text-xs text-red-400 mt-1 text-center">注意：清空動作無法復原，請先匯出備份</p>
            </div>

            <div class="flex gap-3 pt-4 border-t-2 border-slate-100">
                <button id="save-config" class="flex-1 bg-indigo-600 text-white py-3 rounded-xl font-bold shadow-md hover:bg-indigo-700">儲存並同步全班</button>
                <button id="close-admin" class="flex-1 bg-slate-200 py-3 rounded-xl font-bold text-slate-600 hover:bg-slate-300">關閉</button>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, deleteDoc, getDocs, collection, onSnapshot, query, orderBy, limit, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDGmJcE6A_gLVcMbmuCQTZ4Ny5eGKQ6bsw",
        authDomain: "school-4c9bf.firebaseapp.com",
        projectId: "school-4c9bf",
        storageBucket: "school-4c9bf.firebasestorage.app",
        messagingSenderId: "726465099395",
        appId: "1:726465099395:web:2143179e6fd8a919050db6"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const ADMIN_PASSWORD = "teacher"; 
    let currentUser = null, targetText = "", gameTimeLimit = 180, timeLeft = 180;
    let timerInterval = null, isFinished = false, isComposing = false;
    let totalScore = 0, correctWordCount = 0, completedLoops = 0, personalBest = 0;
    
    let totalKeystrokes = 0; 
    let totalErrors = 0;
    let lastInputLen = 0;

    let displayRankLimit = 10; 

    const configDocRef = doc(db, 'competition', 'settings');
    const scoresColRef = collection(db, 'scores');

    function calculateStandardWords(str) {
        if (!str) return 0;
        let chineseCount = 0;
        let otherCount = 0;
        for (let char of str) {
            if (/[\u4e00-\u9fa5\u3105-\u312f]/.test(char)) {
                chineseCount++;
            } else if (char !== '\n' && char !== '\r') {
                otherCount++;
            }
        }
        return chineseCount + (otherCount / 5);
    }

    function normalizeChar(char) {
        if (!char) return "";
        let c = char.charCodeAt(0);
        if (c >= 65281 && c <= 65374) char = String.fromCharCode(c - 65248);
        else if (c === 12288) char = " ";
        return char === '\r' ? '\n' : char;
    }

    // 四年級專屬動物獎章標準 (最高標 36 WPM)
    function getAnimalBadge(wpm) {
        if (wpm >= 31) return { 
            icon: '🐆', 
            title: '獵豹', 
            quote: '「太驚人了！你已經達到四年級的巔峰水準，全班都為你鼓掌！」' 
        };
        if (wpm >= 21) return { 
            icon: '🐎', 
            title: '駿馬', 
            quote: '「跑得真快！你的手指在鍵盤上跳舞，是班上的打字小尖兵！」' 
        };
        if (wpm >= 11) return { 
            icon: '🐈', 
            title: '貓咪', 
            quote: '「身手靈活！你的打字節奏非常棒，已經達到標準水準囉！」' 
        };
        if (wpm >= 6) return { 
            icon: '🐢', 
            title: '烏龜', 
            quote: '「穩紮穩打！龜兔賽跑的贏家就是你，再多練習一點就會變快！」' 
        };
        return { 
            icon: '🐌', 
            title: '樹懶', 
            quote: '「慢慢來，比較快！先把每個按鍵位置找正確，你一定可以的。」' 
        };
    }

    async function init() {
        await signInAnonymously(auth);
        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                
                onSnapshot(configDocRef, (docSnap) => {
                    if (docSnap.exists()) {
                        const data = docSnap.data();
                        targetText = data.text || "";
                        gameTimeLimit = data.duration || 180;
                        displayRankLimit = data.leaderboardLimit || 10;
                        
                        document.getElementById('room-status').textContent = `目標設定：${gameTimeLimit}秒`;
                        document.getElementById('leaderboard-title').innerHTML = `🏆 即時英雄榜 (前 ${displayRankLimit} 名)`;
                        
                        fullReset();
                    }
                });
                
                const q = query(scoresColRef, orderBy("score", "desc"), limit(40));
                onSnapshot(q, (snapshot) => {
                    const scores = [];
                    snapshot.forEach(doc => {
                        scores.push({ id: doc.id, ...doc.data() });
                        if (doc.id === currentUser.uid) {
                            personalBest = doc.data().score || 0;
                            document.getElementById('personal-best').textContent = personalBest;
                        }
                    });
                    updateLeaderboardUI(scores);
                    updateChallengeTarget(scores);
                });
            }
        });
    }

    function fullReset() {
        totalScore = 0; correctWordCount = 0; completedLoops = 0; isFinished = false;
        timeLeft = gameTimeLimit;
        totalKeystrokes = 0; totalErrors = 0; lastInputLen = 0; 
        
        if (timerInterval) clearInterval(timerInterval);
        timerInterval = null;
        
        updateUIStats();
        renderTextDisplay();
        const input = document.getElementById('hidden-input');
        input.value = ''; input.disabled = false;
    }

    function renderTextDisplay() {
        const display = document.getElementById('text-display');
        display.innerHTML = '';
        [...targetText].forEach((char, i) => {
            const span = document.createElement('span');
            span.id = `char-${i}`;
            if (char === '\n') {
                span.className = 'char pending newline';
                display.appendChild(span);
                display.appendChild(document.createElement('br'));
            } else {
                span.textContent = char; span.className = 'char pending';
                display.appendChild(span);
            }
        });
        if (display.firstChild) display.firstChild.classList.add('current');
    }

    function updateUIStats() {
        document.getElementById('current-score').textContent = totalScore;
        document.getElementById('correct-words').textContent = Math.floor(correctWordCount);
        document.getElementById('timer').textContent = `${timeLeft}s`;
        const timeElapsed = gameTimeLimit - timeLeft;
        if (timeElapsed > 0) {
            const wpm = Math.round((correctWordCount / timeElapsed) * 60);
            document.getElementById('wpm-display').textContent = wpm;
        }
    }

    function updateChallengeTarget(scores) {
        const box = document.getElementById('challenge-box');
        const msg = document.getElementById('target-message');
        const myName = document.getElementById('username-input').value;
        
        if (!myName || scores.length < 2 || document.getElementById('game-screen').classList.contains('hidden')) {
            box.classList.add('hidden');
            return;
        }

        const myIndex = scores.findIndex(s => s.id === currentUser.uid);
        
        if (myIndex > 0) {
            const prevPlayer = scores[myIndex - 1];
            const diff = prevPlayer.score - totalScore;
            
            box.classList.remove('hidden');
            if (diff > 0) {
                msg.innerText = `距離前一名「${prevPlayer.username}」還差 ${diff} 分`;
            } else {
                msg.innerText = `太棒了！你目前超越了「${prevPlayer.username}」`;
            }
        } else if (myIndex === 0) {
            box.classList.remove('hidden');
            msg.innerText = `🏆 你是目前的全班冠軍！保持領先！`;
        }
    }

    function startTimer() {
        if (timerInterval) return;
        timerInterval = setInterval(() => {
            timeLeft--; updateUIStats();
            if (timeLeft <= 0) finishGame();
        }, 1000);
    }

    function processInput(inputValue) {
        if (isFinished || !targetText) return;

        let inputLen = inputValue.length;

        // 【防呆 1】防止學生狂按超過文章長度
        if (inputLen > targetText.length) {
            inputValue = inputValue.substring(0, targetText.length);
            document.getElementById('hidden-input').value = inputValue;
            inputLen = targetText.length;
        }

        if (inputLen > lastInputLen) {
            totalKeystrokes += (inputLen - lastInputLen);
            const typed = normalizeChar(inputValue[inputLen - 1]);
            const target = normalizeChar(targetText[inputLen - 1]);
            if (typed !== target) totalErrors++;
        }
        lastInputLen = inputLen;

        let correctChineseCount = 0;
        let correctOtherCount = 0;
        let hasError = false; // 【防呆 2】記錄這輪是否包含錯字

        for (let i = 0; i < targetText.length; i++) {
            const span = document.getElementById(`char-${i}`);
            if (!span) continue;
            span.classList.remove('current');
            
            if (i < inputLen) {
                const typed = normalizeChar(inputValue[i]);
                const target = normalizeChar(targetText[i]);
                if (typed === target) {
                    span.className = `char correct ${target === '\n' ? 'newline' : ''}`;
                    if (/[\u4e00-\u9fa5\u3105-\u312f]/.test(target)) {
                        correctChineseCount++;
                    } else if (target !== '\n' && target !== '\r') {
                        correctOtherCount++;
                    }
                } else {
                    span.className = `char incorrect ${target === '\n' ? 'newline' : ''}`;
                    hasError = true; // 有錯字就標記起來
                }
            } else {
                span.className = `char pending ${targetText[i] === '\n' ? 'newline' : ''}`;
            }
        }

        const wordsInCompleted = calculateStandardWords(targetText) * completedLoops;
        const wordsInCurrent = correctChineseCount + (correctOtherCount / 5);
        correctWordCount = wordsInCompleted + wordsInCurrent;
        
        totalScore = Math.round(correctWordCount * 100);
        updateUIStats();

        // 【防呆 3】必須字數打滿，且「完全沒有錯誤」，才能進入下一輪
        if (inputLen >= targetText.length && !hasError) {
            completedLoops++;
            lastInputLen = 0;
            document.getElementById('hidden-input').value = '';
            renderTextDisplay();
        } else {
            // 游標停留在正確的預期輸入位置
            const nextIndex = Math.min(inputLen, targetText.length - 1);
            const nextSpan = document.getElementById(`char-${nextIndex}`);
            if (nextSpan) nextSpan.classList.add('current');
        }
    }

    async function finishGame() {
        isFinished = true; clearInterval(timerInterval);
        document.getElementById('hidden-input').disabled = true;
        document.getElementById('timer').textContent = "時間到！";
        
        const finalWpm = Math.round((correctWordCount / gameTimeLimit) * 60);
        let accuracy = 100;
        if (totalKeystrokes > 0) {
            accuracy = Math.round(((totalKeystrokes - totalErrors) / totalKeystrokes) * 100);
            if (accuracy < 0) accuracy = 0;
        }

        const badge = getAnimalBadge(finalWpm);
        const username = document.getElementById('username-input').value || '挑戰者';
        
        document.getElementById('summary-name').innerText = username;
        document.getElementById('summary-badge-icon').innerText = badge.icon;
        document.getElementById('summary-badge-title').innerText = badge.title;
        document.getElementById('summary-badge-quote').innerText = badge.quote;
        document.getElementById('summary-words').innerText = Math.floor(correctWordCount);
        document.getElementById('summary-accuracy').innerText = accuracy;
        document.getElementById('summary-wpm').innerText = finalWpm;

        const recordMsg = document.getElementById('new-record-msg');
        recordMsg.classList.add('hidden');

        if (totalScore > 0 && totalScore > personalBest) {
            try {
                await setDoc(doc(db, 'scores', currentUser.uid), {
                    username, score: totalScore, words: Math.floor(correctWordCount), timestamp: serverTimestamp()
                });
                personalBest = totalScore; 
                recordMsg.classList.remove('hidden'); 
                confetti({ particleCount: 150, spread: 80, origin: { y: 0.5 } });
            } catch (e) {
                console.error("更新成績失敗", e);
            }
        }

        setTimeout(() => {
            document.getElementById('summary-panel').classList.remove('hidden');
        }, 500);
    }

    function updateLeaderboardUI(scores) {
        const list = document.getElementById('leaderboard-list');
        list.innerHTML = '';
        if (scores.length === 0) {
            list.innerHTML = '<p class="text-center text-slate-400 py-4 italic">尚無參賽紀錄，來當第一名吧！</p>';
            return;
        }

        const myId = currentUser.uid;
        const myIndex = scores.findIndex(s => s.id === myId);

        scores.forEach((data, index) => {
            if (index < displayRankLimit || index === myIndex) {
                if (index === myIndex && index >= displayRankLimit) {
                    const divider = document.createElement('div');
                    divider.className = "text-center text-slate-300 py-2 text-sm";
                    divider.innerText = "⋮ (你在這裡) ⋮";
                    list.appendChild(divider);
                }

                const item = document.createElement('div');
                const isMe = data.id === myId;
                item.className = `flex items-center justify-between p-3 rounded-xl border shadow-sm transition-all ${isMe ? 'bg-indigo-50 border-indigo-400 my-rank-highlight ring-1 ring-indigo-200' : 'bg-white border-slate-100 hover:border-indigo-100'}`;
                
                let medal = `<span class="font-bold w-6 text-slate-400">${index + 1}.</span>`;
                if (index === 0) medal = `<span class="font-bold w-6 text-xl">🥇</span>`;
                else if (index === 1) medal = `<span class="font-bold w-6 text-xl">🥈</span>`;
                else if (index === 2) medal = `<span class="font-bold w-6 text-xl">🥉</span>`;

                item.innerHTML = `
                    <div class="flex items-center gap-3 truncate">
                        ${medal}
                        <span class="font-bold text-slate-700 truncate">${data.username} ${isMe ? '<small class="text-indigo-500 ml-1">(你)</small>' : ''}</span>
                    </div>
                    <div class="text-right ml-2">
                        <div class="font-black text-indigo-600 text-lg">${data.score}</div>
                        <div class="text-[11px] font-medium text-slate-400">${data.words} 項</div>
                    </div>`;
                list.appendChild(item);
            }
        });
    }

    async function exportToExcel() {
        const btn = document.getElementById('export-excel');
        const originalText = btn.innerHTML;
        btn.disabled = true;
        btn.innerText = "正在匯出中...";

        try {
            const querySnapshot = await getDocs(query(scoresColRef, orderBy("score", "desc")));
            const data = [];
            
            // 1. 新增表頭：「每分鐘字數(WPM)」
            data.push(["排名", "姓名", "總得分", "正確項數", "每分鐘字數(WPM)", "參賽時間"]);

            let rank = 1;
            querySnapshot.forEach((docSnap) => {
                const item = docSnap.data();
                const date = item.timestamp ? item.timestamp.toDate().toLocaleString('zh-TW') : "無紀錄";
                
                // 2. 動態計算該筆紀錄的 WPM (利用正確字數與目前設定的比賽時間)
                const wpm = Math.round((item.words / gameTimeLimit) * 60);

                // 3. 將 WPM 插入到匯出資料中
                data.push([
                    rank++,
                    item.username,
                    item.score,
                    item.words,
                    wpm,
                    date
                ]);
            });

            if (data.length <= 1) {
                alert("目前尚無任何成績紀錄可供匯出！");
                return;
            }

            const worksheet = XLSX.utils.aoa_to_sheet(data);
            const workbook = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(workbook, worksheet, "打字競賽成績單");

            // 4. 調整欄位寬度，多加一個 {wch: 15} 給 WPM 欄位
            const wscols = [{wch: 6}, {wch: 15}, {wch: 10}, {wch: 10}, {wch: 16}, {wch: 25}];
            worksheet['!cols'] = wscols;

            const fileName = `班級打字競賽成績_${new Date().toLocaleDateString().replace(/\//g, '-')}.xlsx`;
            XLSX.writeFile(workbook, fileName);

        } catch (error) {
            console.error("匯出失敗：", error);
            alert("匯出失敗，請檢查網路連線或稍後再試。");
        } finally {
            btn.disabled = false;
            btn.innerHTML = originalText;
        }
    }
    // 事件監聽：開始按鈕 (修改為進入立即計時)
    document.getElementById('start-btn').addEventListener('click', () => {
        const username = document.getElementById('username-input').value.trim();
        if (!username) return alert('請輸入姓名再開始喔！');
        
        document.getElementById('join-screen').classList.add('hidden');
        document.getElementById('game-screen').classList.remove('hidden');
        
        fullReset();
        renderTextDisplay();
        
        // 進入即啟動計時
        startTimer();
        
        setTimeout(() => document.getElementById('hidden-input').focus(), 300);
    });

    // 事件監聽：重新開始
    document.getElementById('restart-btn').addEventListener('click', () => {
        document.getElementById('summary-panel').classList.add('hidden');
        document.getElementById('game-screen').classList.add('hidden');
        document.getElementById('join-screen').classList.remove('hidden');
        fullReset();
    });

    const inputArea = document.getElementById('hidden-input');

    // 【防呆 4】阻擋複製貼上
    inputArea.addEventListener('paste', (e) => {
        e.preventDefault();
        alert('請自己練習打字，不可以偷吃步用貼上的喔！');
    });

    inputArea.addEventListener('compositionstart', () => isComposing = true);
    inputArea.addEventListener('compositionend', (e) => { isComposing = false; processInput(e.target.value); });
    inputArea.addEventListener('input', (e) => { if (!isComposing) processInput(e.target.value); });

    // 教師功能
    document.getElementById('admin-toggle').addEventListener('click', () => document.getElementById('admin-auth-panel').classList.remove('hidden'));
    
    document.getElementById('confirm-auth').addEventListener('click', () => {
        if (document.getElementById('admin-password-input').value === ADMIN_PASSWORD) {
            document.getElementById('admin-auth-panel').classList.add('hidden');
            document.getElementById('admin-panel').classList.remove('hidden');
            document.getElementById('admin-text-input').value = targetText;
            document.getElementById('admin-time-input').value = gameTimeLimit;
            document.getElementById('admin-limit-input').value = displayRankLimit;
        } else alert("密碼錯誤");
    });

    document.getElementById('export-excel').addEventListener('click', exportToExcel);
    
    document.getElementById('clear-leaderboard').addEventListener('click', async () => {
        const confirmClear = confirm("確定要清空全班目前的排行榜嗎？\n建議先執行「匯出成績 Excel」備份！\n此動作無法復原。");
        if (confirmClear) {
            const btn = document.getElementById('clear-leaderboard');
            btn.innerHTML = "資料清空中...";
            btn.disabled = true;
            try {
                const querySnapshot = await getDocs(scoresColRef);
                const deletePromises = [];
                querySnapshot.forEach((docSnap) => deletePromises.push(deleteDoc(docSnap.ref)));
                await Promise.all(deletePromises);
                alert("✅ 排行榜已成功清空！");
            } catch (error) {
                console.error("清空失敗：", error);
                alert("清空失敗。");
            }
            btn.innerHTML = "<span>🗑️</span> 清空全班所有成績紀錄";
            btn.disabled = false;
        }
    });

    document.getElementById('save-config').addEventListener('click', async () => {
        const text = document.getElementById('admin-text-input').value.trim();
        const duration = parseInt(document.getElementById('admin-time-input').value) || 180;
        const limitVal = parseInt(document.getElementById('admin-limit-input').value) || 10;
        
        if (text && duration) {
            await setDoc(configDocRef, { text, duration, leaderboardLimit: limitVal });
            document.getElementById('admin-panel').classList.add('hidden');
        }
    });
    
    document.getElementById('cancel-auth').addEventListener('click', () => document.getElementById('admin-auth-panel').classList.add('hidden'));
    document.getElementById('close-admin').addEventListener('click', () => document.getElementById('admin-panel').classList.add('hidden'));

    init();
</script>
</body>
</html>
